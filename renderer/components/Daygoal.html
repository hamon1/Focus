<!DOCTYPE html>
<html lang="ko">
    <head>
        <meta charset="UTF-8">
        <link rel="stylesheet" href="../styles/daygoal.css">
    </head>
    <body>
        <div class="drag-bar"></div>

        <div class="app">
            <div class="timer-area">
                <div id="start-screen">
                    <button class="mode-btn mini" onclick="setMode('MINI')" title="Mini Mode">
                        <span class="icon"></span>
                    </button>
                    <button class="mode-btn timer" onclick="setMode('TIMER')" title="Timer Mode">
                        <span class="icon"></span>
                    </button>
                    <button class="mode-btn full" onclick="setMode('FULL')" title="Full Mode">
                        <span class="icon"></span>
                    </button>
                </div>
                <div id="current-task"></div>
                
                <canvas id="clock" width="300" height="300"></canvas>
                
                <div id="controls">
                    <button id="startBtn">Start</button>
                    <button id="pauseBtn">Pause</button>
                    <button id="stopBtn">Finish</button>
                </div>
            </div>
            <div class="side-panel">
                <div class="goal-section">
                    <input id="taskInput" placeholder="목표 추가" />
                    <button id="addTaskBtn">추가</button>
    
                    <ul id="taskList"></ul>
                </div>
                <div class="history-section">
                    <h3>완료 기록</h3>
                    <div id="history-list"></div>
                </div>
            </div>
        </div>

        <script type="module" src="app.js"></script>
    </body>
</html>
